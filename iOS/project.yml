name: SportsSeasonLog
options:
  bundleIdPrefix: com.shimondeitel.sportsseasonlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SportsSeasonLog:
    type: application
    platform: iOS
    sources:
      - path: SportsSeasonLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sportsseasonlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SportsSeasonLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SportsSeasonLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SportsSeasonLogTests
      - path: SportsSeasonLog.storekit
    dependencies:
      - target: SportsSeasonLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sportsseasonlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SportsSeasonLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SportsSeasonLogUITests
    dependencies:
      - target: SportsSeasonLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sportsseasonlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SportsSeasonLog:
    build:
      targets:
        SportsSeasonLog: all
        SportsSeasonLogTests: [test]
        SportsSeasonLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SportsSeasonLog.storekit
    test:
      config: Debug
      storeKitConfiguration: SportsSeasonLog.storekit
      targets:
        - SportsSeasonLogTests
        - SportsSeasonLogUITests
    archive:
      config: Release
